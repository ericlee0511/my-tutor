<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>Tutor</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="title-row">
      <h1>📚 <span id="title-stats" class="title-link">Tutor</span></h1>
      <div class="settings">
        <button id="lang-btn" class="chip">EN</button>
        <button id="gept-sub-btn" class="chip" hidden>初級</button>
        <button id="toeic-sub-btn" class="chip" hidden>基礎生活</button>
        <button id="dir-btn" class="chip">日→中</button>
        <button id="lookup-btn" class="chip" title="情境句單字反查">🔍</button>
        <button id="level-btn" class="chip">N5</button>
      </div>
    </div>
    <div class="streak-row">
      <button id="streak-fire" class="streak-dim" title="學習成就">🗣️<span id="streak-num">0</span></button>
      <div class="streak-bar" id="sentence-bar" title="句子練習">
        <div class="streak-bar-track"><div id="streak-bar-fill"></div></div>
        <span id="streak-bar-text">0 / 30</span>
      </div>
    </div>
    <div class="streak-row mem-row">
      <button id="mem-fire" class="streak-dim" title="記憶複習">🗃️</button>
      <div class="streak-bar" id="mem-bar" title="記憶複習">
        <div class="streak-bar-track"><div id="mem-bar-fill"></div></div>
        <span id="mem-bar-text">0 / 0</span>
      </div>
    </div>
  </header>

  <main>
    <div class="actions">
      <button class="action" data-action="word">📖 單字</button>
      <button class="action" data-action="grammar">📘 文法</button>
      <button class="action" data-action="quiz">❓ 選擇題</button>
      <button class="action" data-action="scene">🎭 情境句</button>
    </div>

    <article id="content">
      <div class="hint">點上方按鈕開始學習<br>等級 / 語言可點頂部切換</div>
    </article>
  </main>

  <footer>
    <span id="stats"></span>
  </footer>

  <div id="level-picker" class="picker-overlay" hidden>
    <div class="picker-card">
      <div class="picker-row picker-row-dele">
        <button class="picker-btn" data-level="da1">DELE A1</button>
        <button class="picker-btn" data-level="da2">DELE A2</button>
        <button class="picker-btn" data-level="db1">DELE B1</button>
        <button class="picker-btn" data-level="db2">DELE B2</button>
        <button class="picker-btn" data-level="dc1">DELE C1</button>
        <button class="picker-btn" data-level="dc2">DELE C2</button>
      </div>
      <div class="picker-row">
        <button class="picker-btn" data-level="t1">TOPIK 1</button>
        <button class="picker-btn" data-level="t2">TOPIK 2</button>
        <button class="picker-btn" data-level="t3">TOPIK 3</button>
        <button class="picker-btn" data-level="t4">TOPIK 4</button>
        <button class="picker-btn" data-level="t5">TOPIK 5</button>
        <button class="picker-btn" data-level="t6">TOPIK 6</button>
      </div>
      <div class="picker-row picker-row-n">
        <button class="picker-btn" data-level="n5">N5</button>
        <button class="picker-btn" data-level="n4">N4</button>
        <button class="picker-btn" data-level="n3">N3</button>
        <button class="picker-btn" data-level="n2">N2</button>
        <button class="picker-btn" data-level="n1">N1</button>
      </div>
      <div class="picker-row picker-row-toeic">
        <button class="picker-btn" data-level="toeic">TOEIC</button>
        <button class="picker-btn" data-level="gept">GEPT</button>
      </div>
    </div>
  </div>

  <div id="gept-sub-picker" class="picker-overlay" hidden>
    <div class="picker-card">
      <div class="picker-row picker-row-gept-sub">
        <button class="picker-btn" data-sub="初級">初級</button>
        <button class="picker-btn" data-sub="中級">中級</button>
        <button class="picker-btn" data-sub="中高級">中高級</button>
        <button class="picker-btn" data-sub="高級">高級</button>
        <button class="picker-btn" data-sub="優級">優級</button>
      </div>
    </div>
  </div>

  <div id="toeic-sub-picker" class="picker-overlay" hidden>
    <div class="picker-card">
      <div class="picker-row picker-row-toeic-sub">
        <button class="picker-btn" data-sub="基礎生活級">基礎生活</button>
        <button class="picker-btn" data-sub="職場日常級">職場日常</button>
        <button class="picker-btn" data-sub="進階商務級">進階商務</button>
        <button class="picker-btn" data-sub="專業頂尖級">專業頂尖</button>
      </div>
    </div>
  </div>

  <div id="stats-picker" class="picker-overlay" hidden>
    <div class="picker-card stats-card">
      <div class="stats-header">
        <h2 class="stats-title">📊 學習資料統計</h2>
        <button class="stats-close" id="stats-close" aria-label="關閉">✕</button>
      </div>
      <div class="stats-body" id="stats-body">
        <div class="hint">載入中…</div>
      </div>
    </div>
  </div>

  <div id="streak-picker" class="picker-overlay" hidden>
    <div class="picker-card stats-card">
      <div class="stats-header streak-header">
        <h2 class="stats-title">🏆 學習成就</h2>
        <div class="streak-avatar">🧑‍💼</div>
        <button class="stats-close" id="streak-close" aria-label="關閉">✕</button>
      </div>
      <div class="srs-tabs">
        <button class="srs-tab active" data-tab="sentence">句子練習</button>
        <button class="srs-tab" data-tab="memory">記憶複習</button>
      </div>
      <div class="stats-body">
        <div id="tab-sentence" class="srs-panel">
          <div class="streak-badges" id="streak-badges"></div>
          <div id="streak-summary"></div>
          <div id="streak-heatmap"></div>
        </div>
        <div id="tab-memory" class="srs-panel" hidden>
          <div id="mem-stats"></div>
          <div id="mem-langs"></div>
          <div id="mem-heatmap"></div>
          <div id="mem-retention"></div>
        </div>
        <div class="streak-backup-row">
          <button class="chip" id="export-btn" title="匯出備份">📤 匯出</button>
          <button class="chip" id="import-btn" title="匯入備份">📥 匯入</button>
          <input type="file" id="import-file" accept=".json" hidden>
        </div>
        <p class="streak-note">資料只存本機；清快取會消失。建議定期匯出備份。</p>
      </div>
    </div>
  </div>

  <div id="lookup-search" class="picker-overlay" hidden>
    <div class="picker-card stats-card">
      <div class="stats-header">
        <h2 class="stats-title">🔍 查單字</h2>
        <button class="stats-close" id="lookup-search-close" aria-label="關閉">✕</button>
      </div>
      <div class="lookup-search-body">
        <div class="lookup-input-wrap">
          <input type="text" id="lookup-input" class="lookup-input" autocomplete="off"
                 placeholder="輸入單字，或中文意思">
          <button id="lookup-go" class="lookup-go-inline" aria-label="查詢">🔍</button>
          <ul id="lookup-suggest" class="lookup-suggest" hidden></ul>
        </div>
        <div id="lookup-results" class="lookup-results"></div>
      </div>
    </div>
  </div>

  <div id="card-picker" class="picker-overlay" hidden>
    <div class="picker-card">
      <div class="srs-deck-top">
        <button class="picker-btn srs-study-btn" id="srs-study-btn">📖 單字</button>
      </div>
      <div class="srs-deck-divider"></div>
      <div class="picker-row picker-row-dele">
        <button class="picker-btn" data-deck="dele:da1">DELE A1</button>
        <button class="picker-btn" data-deck="dele:da2">DELE A2</button>
        <button class="picker-btn" data-deck="dele:db1">DELE B1</button>
        <button class="picker-btn" data-deck="dele:db2">DELE B2</button>
        <button class="picker-btn" data-deck="dele:dc1">DELE C1</button>
        <button class="picker-btn" data-deck="dele:dc2">DELE C2</button>
      </div>
      <div class="picker-row">
        <button class="picker-btn" data-deck="ko:t1">TOPIK 1</button>
        <button class="picker-btn" data-deck="ko:t2">TOPIK 2</button>
        <button class="picker-btn" data-deck="ko:t3">TOPIK 3</button>
        <button class="picker-btn" data-deck="ko:t4">TOPIK 4</button>
        <button class="picker-btn" data-deck="ko:t5">TOPIK 5</button>
        <button class="picker-btn" data-deck="ko:t6">TOPIK 6</button>
      </div>
      <div class="picker-row picker-row-n">
        <button class="picker-btn" data-deck="jap:n5">N5</button>
        <button class="picker-btn" data-deck="jap:n4">N4</button>
        <button class="picker-btn" data-deck="jap:n3">N3</button>
        <button class="picker-btn" data-deck="jap:n2">N2</button>
        <button class="picker-btn" data-deck="jap:n1">N1</button>
      </div>
      <div class="picker-row picker-row-toeic-sub">
        <button class="picker-btn srs-2line" data-deck="toeic:基礎生活級"><span class="d1">TOEIC</span><span class="d2">基礎生活</span></button>
        <button class="picker-btn srs-2line" data-deck="toeic:職場日常級"><span class="d1">TOEIC</span><span class="d2">職場日常</span></button>
        <button class="picker-btn srs-2line" data-deck="toeic:進階商務級"><span class="d1">TOEIC</span><span class="d2">進階商務</span></button>
        <button class="picker-btn srs-2line" data-deck="toeic:專業頂尖級"><span class="d1">TOEIC</span><span class="d2">專業頂尖</span></button>
      </div>
      <div class="picker-row picker-row-gept-sub">
        <button class="picker-btn srs-2line" data-deck="gept:初級"><span class="d1">GEPT</span><span class="d2">初級</span></button>
        <button class="picker-btn srs-2line" data-deck="gept:中級"><span class="d1">GEPT</span><span class="d2">中級</span></button>
        <button class="picker-btn srs-2line" data-deck="gept:中高級"><span class="d1">GEPT</span><span class="d2">中高級</span></button>
        <button class="picker-btn srs-2line" data-deck="gept:高級"><span class="d1">GEPT</span><span class="d2">高級</span></button>
        <button class="picker-btn srs-2line" data-deck="gept:優級"><span class="d1">GEPT</span><span class="d2">優級</span></button>
      </div>
    </div>
  </div>

  <div id="srs-review" class="picker-overlay" hidden>
    <div class="picker-card stats-card srs-review-card">
      <div class="stats-header">
        <span id="srs-rev-title" class="stats-title">複習</span>
        <span id="srs-rev-progress" class="srs-rev-progress">0 / 0</span>
        <button class="stats-close" id="srs-rev-close" aria-label="關閉">✕</button>
      </div>
      <div class="srs-tabs srs-dir-tabs">
        <button class="srs-tab active" data-dir="f">外→中</button>
        <button class="srs-tab" data-dir="r">中→外</button>
      </div>
      <div class="srs-review-body">
        <div id="srs-card" class="srs-card"></div>
        <div id="srs-controls" class="srs-controls"></div>
      </div>
    </div>
  </div>

  <script src="vendor/kuromoji/kuromoji.js"></script>
  <script src="app.js"></script>
</body>
</html>
