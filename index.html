<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>日文家教</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📚 日文家教</h1>
    <div class="settings">
      <button id="level-btn" class="chip">N5</button>
      <button id="lang-btn" class="chip">EN</button>
      <button id="dir-btn" class="chip">日→中</button>
    </div>
  </header>

  <main>
    <div class="actions">
      <button class="action" data-action="word">📖 單字</button>
      <button class="action" data-action="quiz">❓ 選擇題</button>
      <button class="action" data-action="grammar">📘 文法</button>
      <button class="action" data-action="scene">🎭 情境句</button>
    </div>

    <article id="content">
      <div class="hint">點上方按鈕開始學習<br>等級 / 語言可點頂部切換</div>
    </article>
  </main>

  <footer>
    <span id="stats"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
